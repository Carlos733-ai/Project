<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Title</title>

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* =========================
   SKY
========================= */
body{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 35%),
        linear-gradient(
            to bottom,
            #ffb15e 0%,
            #ff914d 8%,
            #ff7a59 14%,
            #5ca2ff 30%,
            #2f7fff 65%,
            #1f5fd1 100%
        );
}

/* sparkle layer */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.25) 1px, transparent 1px);
    background-size:40px 40px;
    opacity:.5;
    animation:sparkleMove 25s linear infinite;
}

@keyframes sparkleMove{
    from{ transform:translateY(0px); }
    to{ transform:translateY(-40px); }
}

/* =========================
   SUN
========================= */
.sun{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);

    width:170px;
    height:170px;
    border-radius:50%;

    background: radial-gradient(circle, #fff7c2 0%, #ffd54f 45%, #ffae00 100%);

    box-shadow:
        0 0 40px rgba(255,220,100,.7),
        0 0 120px rgba(255,180,0,.55);

    z-index:1;
}

/* =========================
   SKY CENTER FEATURE (NEW)
========================= */
.sky-focus{
    position:absolute;
    top:48%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:2;
    pointer-events:none;
}

.sky-ring{
    width:260px;
    height:260px;
    border-radius:50%;

    background: radial-gradient(circle,
        rgba(255,255,255,0.35) 0%,
        rgba(120,200,255,0.15) 40%,
        transparent 70%
    );

    border:2px solid rgba(255,255,255,0.25);

    animation:pulse 4s ease-in-out infinite;
}

.sky-core{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);

    padding:10px 18px;
    border-radius:20px;

    background:rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);

    font-size:16px;
    font-weight:700;
    color:#1f4fb8;
}

@keyframes pulse{
    0%{ transform:scale(0.95); opacity:0.6; }
    50%{ transform:scale(1.05); opacity:1; }
    100%{ transform:scale(0.95); opacity:0.6; }
}

/* =========================
   CLOUD BASE
========================= */
.cloud-container{
    position:relative;
    width:100vw;
    height:100vh;
}

.cloud-box{
    position:absolute;

    background: linear-gradient(to bottom, #dff4ff 0%, #b9e4ff 100%);
    border-radius:50%;
    overflow:hidden;

    box-shadow:
        inset -15px -15px 25px rgba(0,0,0,0.06),
        inset 10px 10px 25px rgba(255,255,255,0.8),
        0 15px 35px rgba(0,0,0,0.15);

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;

    animation:float 6s ease-in-out infinite;
}

@keyframes float{
    0%{ transform:translateY(0px); }
    50%{ transform:translateY(-10px); }
    100%{ transform:translateY(0px); }
}

/* fluffy bumps */
.cloud-box::before,
.cloud-box::after{
    content:"";
    position:absolute;
    background:inherit;
    border-radius:50%;
    z-index:-1;
}

.cloud-box::before{
    width:55%;
    height:60%;
    top:-18%;
    left:12%;
}

.cloud-box::after{
    width:45%;
    height:50%;
    top:-10%;
    right:15%;
}

/* =========================
   SHAPES
========================= */
.vertical-cloud{ border-radius:45%; }
.horizontal-cloud{ border-radius:50px; }

/* =========================
   CLOUD POSITIONS
========================= */

.mc-big{
    width:360px;
    height:220px;
    top:58%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:5;
}

.mc-med{
    width:280px;
    height:180px;
    top:8%;
    left:6%;
}

.mc-extra{
    width:240px;
    height:150px;
    top:8%;
    right:6%;
}

.mc-img{
    width:260px;
    height:180px;
    bottom:8%;
    left:10%;
}

.v-cloud1{
    width:150px;
    height:280px;
    top:32%;
    left:1%;
}

.v-cloud2{
    width:140px;
    height:240px;
    top:30%;
    right:1%;
}

/* =========================
   IMAGE CLOUD
========================= */
.cloud-wide{
    position:absolute;

    width:260px;
    height:360px;

    top:42%;
    left:70%;

    transform:translate(-50%, -50%);
    z-index:6;

    border-radius:35px;
    overflow:hidden;

    box-shadow:
        inset -15px -15px 25px rgba(0,0,0,0.06),
        inset 10px 10px 25px rgba(255,255,255,0.8),
        0 15px 35px rgba(0,0,0,0.15);
}

.cloud-image{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* =========================
   TEXT
========================= */
.cloud-title{
    font-size:30px;
    font-weight:800;
    color:#2456b8;
}

.cloud-text{
    font-size:19px;
    font-weight:600;
    color:#3568cc;
}

/* =========================
   MOBILE
========================= */
@media(max-width:900px){
    .mc-big{ width:340px; height:220px; }
    .mc-med,.mc-extra,.mc-img{ transform:scale(.8); }
    .v-cloud1,.v-cloud2{ display:none; }
}

</style>
</head>

<body>

<div class="sun"></div>

<!-- ✨ NEW CENTER FEATURE -->
<div class="sky-focus">
    <div class="sky-ring"></div>
    <div class="sky-core">Focus Zone</div>
</div>

<div class="cloud-container">

    <section class="cloud-box mc-big">
        <div class="cloud-title">Title</div>
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box mc-med horizontal-cloud">
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box mc-extra horizontal-cloud">
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box mc-img">
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box v-cloud1 vertical-cloud">
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box v-cloud2 vertical-cloud">
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box cloud-wide">
        <img src="images/Test.png" class="cloud-image">
    </section>

</div>

</body></html>
