<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Title</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* 🌅 SKY */
body{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 35%),
        linear-gradient(
            to bottom,
            #ffb15e 0%,
            #ff914d 8%,
            #ff7a59 14%,
            #5ca2ff 30%,
            #2f7fff 65%,
            #1f5fd1 100%
        );
}
/* ✨ floating glow dust */

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(circle, rgba(255,255,255,0.25) 1px, transparent 1px);
    background-size:40px 40px;
    opacity:.5;
    animation: sparkleMove 25s linear infinite;
}

@keyframes sparkleMove{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(-40px);
    }
}

/* ☀️ SUN */

.sun{
    position:absolute;

    top:40px;
    left:50%;

    transform:translateX(-50%);

    width:170px;
    height:170px;
    border-radius:50%;

    background:
        radial-gradient(circle, #fff7c2 0%, #ffd54f 45%, #ffae00 100%);

    box-shadow:
        0 0 40px rgba(255,220,100,.7),
        0 0 120px rgba(255,180,0,.55);

    z-index:1;
}
/* ☁️ CLOUD CONTAINER */

.cloud-container{
    position:relative;
    width:100vw;
    height:100vh;
}

/* ☁️ MAIN CLOUD STYLE */

.cloud-box{
    position:absolute;
    background:
        linear-gradient(to bottom, #dff4ff 0%, #b9e4ff 100%);
    border-radius:50%;
    overflow:hidden;

    box-shadow:
        inset -15px -15px 25px rgba(0,0,0,0.06),
        inset 10px 10px 25px rgba(255,255,255,0.8),
        0 15px 35px rgba(0,0,0,0.15);

    animation: float 6s ease-in-out infinite;
}

/* ☁️ fluffy cloud bumps */

.cloud-box::before,
.cloud-box::after{
    content:"";
    position:absolute;
    background:inherit;
    border-radius:50%;
    z-index:-1;
}

.cloud-box::before{
    width:55%;
    height:60%;
    top:-18%;
    left:12%;
}

.cloud-box::after{
    width:45%;
    height:50%;
    top:-10%;
    right:15%;
}

/* 🌊 FLOAT */

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
    100%{
        transform:translateY(0px);
    }
}

/* 🌀 VERTICAL CLOUDS */

.vertical-cloud{
    border-radius:45%;
}

.vertical-cloud::before{
    width:70%;
    height:35%;
    top:10%;
    left:-10%;
}

.vertical-cloud::after{
    width:70%;
    height:35%;
    bottom:10%;
    right:-10%;
    top:auto;
}

/* ➖ HORIZONTAL CLOUDS */

.horizontal-cloud{
    border-radius:50px;
}

.horizontal-cloud::before{
    width:35%;
    height:80%;
    top:-20%;
    left:15%;
}

.horizontal-cloud::after{
    width:35%;
    height:80%;
    top:-15%;
    right:15%;
}

/* 🌟 CORNER CLOUDS */

.corner-cloud{
    position:absolute;
    width:clamp(120px, 16vw, 220px);
    height:clamp(120px, 16vw, 220px);
    background:white;
    opacity:.95;

    mask-image:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.5,19c-3,0-5.5-2.5-5.5-5.5c0-0.2,0-0.4,0-0.6C10.8,13.7,9.5,14,8,14c-3.3,0-6-2.7-6-6s2.7-6,6-6c1.2,0,2.3,0.4,3.2,1c1.1-2.4,3.5-4,6.3-4c3.9,0,7,3.1,7,7c0,0.4,0,0.8-0.1,1.2C22.6,8.4,24,10.5,24,13C24,16.3,21.3,19,17.5,19z"/></svg>');

    mask-size:contain;
    mask-repeat:no-repeat;

    -webkit-mask-image:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.5,19c-3,0-5.5-2.5-5.5-5.5c0-0.2,0-0.4,0-0.6C10.8,13.7,9.5,14,8,14c-3.3,0-6-2.7-6-6s2.7-6,6-6c1.2,0,2.3,0.4,3.2,1c1.1-2.4,3.5-4,6.3-4c3.9,0,7,3.1,7,7c0,0.4,0,0.8-0.1,1.2C22.6,8.4,24,10.5,24,13C24,16.3,21.3,19,17.5,19z"/></svg>');

    -webkit-mask-size:contain;
    -webkit-mask-repeat:no-repeat;

    z-index:20;
}

.c1rotate-tl{
    top:-25px;
    left:-25px;
}

.c1rotate-tr{
    top:-25px;
    right:-25px;
    transform:rotate(90deg);
}

.c1rotate-br{
    bottom:-25px;
    right:-25px;
    transform:rotate(180deg);
}

.c1rotate-bl{
    bottom:-25px;
    left:-25px;
    transform:rotate(270deg);
}

/* ☁️ MAIN CLOUDS */

.mc-big{
    width:460px;
    height:280px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:5;
}

.mc-med{
    width:280px;
    height:180px;
    top:12%;
    left:12%;
}

.mc-small{
    width:190px;
    height:120px;
    bottom:14%;
    right:12%;
}

.mc-img{
    width:260px;
    height:180px;
    bottom:15%;
    left:14%;
}

.mc-extra{
    width:240px;
    height:150px;
    top:14%;
    right:14%;
}

/* ↕️ VERTICAL CLOUDS */

.v-cloud1{
    width:150px;
    height:280px;
    top:28%;
    left:4%;
}

.v-cloud2{
    width:140px;
    height:240px;
    top:18%;
    right:4%;
}

/* ↔️ HORIZONTAL CLOUDS */

.h-cloud1{
    width:260px;
    height:100px;
    top:75%;
    left:32%;
}

.h-cloud2{
    width:240px;
    height:95px;
    top:28%;
    right:32%;
}

/* 🖼 IMAGE */

.cloud-image{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 📱 MOBILE */

@media(max-width:900px){

    .mc-big{
        width:340px;
        height:220px;
    }

    .mc-med,
    .mc-extra,
    .mc-img{
        transform:scale(.8);
    }

    .v-cloud1,
    .v-cloud2{
        display:none;
    }
}

</style>
</head>

<body>

<div class="sun"></div>

<div class="corner-cloud c1rotate-tl"></div>
<div class="corner-cloud c1rotate-tr"></div>
<div class="corner-cloud c1rotate-br"></div>
<div class="corner-cloud c1rotate-bl"></div>

<div class="cloud-container">

    <section class="cloud-box mc-big"></section>

    <section class="cloud-box mc-med horizontal-cloud">
                <img src="images/Test.png" alt="Image" class="cloud-image">
    </section>

    <section class="cloud-box mc-extra horizontal-cloud">
        <div class="cloud-text">Text</div></section>

    <section class="cloud-box mc-img">

        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box mc-small">
        <div class="cloud-text">Text</div></section>

    <section class="cloud-box vertical-cloud v-cloud1">

        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box vertical-cloud v-cloud2">
                <img src="images/Test.png" alt="Image" class="cloud-image">
    </section>

    <section class="cloud-box horizontal-cloud h-cloud1"><p>Text</p></section>

    <section class="cloud-box horizontal-cloud h-cloud2">
        <img src="images/Test.png" alt="Image" class="cloud-image">
    </section>

</div>

</body>
</html>
