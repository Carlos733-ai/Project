<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stop using social media</title>

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* =========================
   SKY
========================= */
body{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 35%),
        linear-gradient(
            to bottom,
            #ffb15e 0%,
            #ff914d 8%,
            #ff7a59 14%,
            #5ca2ff 30%,
            #2f7fff 65%,
            #1f5fd1 100%
        );
}

/* sparkle layer */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.25) 1px, transparent 1px);
    background-size:40px 40px;
    opacity:.5;
    animation:sparkleMove 25s linear infinite;
}

@keyframes sparkleMove{
    from{ transform:translateY(0px); }
    to{ transform:translateY(-40px); }
}

/* =========================
   SUN
========================= */
.sun{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);

    width:170px;
    height:170px;
    border-radius:50%;

    background: radial-gradient(circle, #fff7c2 0%, #ffd54f 45%, #ffae00 100%);

    box-shadow:
        0 0 40px rgba(255,220,100,.7),
        0 0 120px rgba(255,180,0,.55);

    z-index:1;
}

/* =========================
   CLOUD BASE
========================= */
.cloud-container{
    position:relative;
    width:100vw;
    height:100vh;
}

.cloud-box{
    position:absolute;

    background:linear-gradient(to bottom,#ffffff 0%,#f2f8ff 100%);
    border-radius:999px;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    box-shadow:0 15px 35px rgba(0,0,0,0.12);

    animation:float 6s ease-in-out infinite;
}

/* smooth cloud blobs */
.cloud-circle{
    position:absolute;
    background:inherit;
    border-radius:50%;
}

/* natural cluster */
.c1{ width:60%; height:85%; left:5%; top:10%; }
.c2{ width:70%; height:100%; left:22%; top:-25%; }
.c3{ width:60%; height:85%; right:5%; top:10%; }
.c4{ width:45%; height:65%; left:50%; top:-10%; }
.c5{ width:40%; height:55%; right:20%; top:25%; }

@keyframes float{
    0%{ transform:translateY(0px); }
    50%{ transform:translateY(-10px); }
    100%{ transform:translateY(0px); }
}

/* =========================
   POSITIONS
========================= */

.mc-big{
    width:360px;
    height:220px;
    top:18%;
    left:52%;
    transform:translate(-50%, -50%);
}

.mc-med{
    width:280px;
    height:180px;
    top:8%;
    left:6%;
}

.mc-extra{
    width:240px;
    height:150px;
    top:8%;
    right:6%;
}

.mc-img{
    width:260px;
    height:180px;
    bottom:8%;
    left:10%;
}

.mc-new{
    width:430px;
    height:210px;
    top:420px;
    left: calc(50% - 250px);
    transform: translateX(-50%);
}

/* =========================
   VERTICAL CLOUDS FIXED
========================= */

.v-cloud1,
.v-cloud2{
    position:absolute;

    width:150px;
    height:260px;

    background:linear-gradient(to bottom,#ffffff 0%,#f2f8ff 100%);
    border-radius:80px;

    box-shadow:0 15px 35px rgba(0,0,0,0.12);

    animation:float 6s ease-in-out infinite;
}

/* stacked cloud blobs */
.v-cloud1::before,
.v-cloud1::after,
.v-cloud2::before,
.v-cloud2::after{
    content:"";
    position:absolute;
    background:inherit;
    border-radius:50%;
}

/* top blob */
.v-cloud1::before,
.v-cloud2::before{
    width:95px;
    height:95px;
    top:-30px;
    left:25px;
}

/* bottom blob */
.v-cloud1::after,
.v-cloud2::after{
    width:110px;
    height:110px;
    top:70px;
    left:10px;
}

/* positions */
.v-cloud1{
    top:32%;
    left:1%;
}

.v-cloud2{
    top:30%;
    right:1%;
}

/* =========================
   IMAGE CLOUD
========================= */

.cloud-wide{
    position:absolute;
    width:260px;
    height:360px;
    top:50%;
    left:90%;
    transform:translate(-50%, -50%);
    border-radius:45px;
    overflow:hidden;
    background:linear-gradient(to bottom,#ffffff 0%,#f2f8ff 100%);
}

.cloud-wide img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* =========================
   TEXT
========================= */

.cloud-title{
    font-size:30px;
    font-weight:800;
    color:#2456b8;
    z-index:2;
}

.cloud-text{
    font-size:19px;
    font-weight:600;
    color:#3568cc;
    z-index:2;
}

/* =========================
   GRASS
========================= */

.grass{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:55px;
    background:#38b24a;
}

</style>
</head>

<body>

<div class="sun"></div>

<div class="cloud-container">

    <section class="cloud-box mc-big">
        <div class="cloud-circle c1"></div>
        <div class="cloud-circle c2"></div>
        <div class="cloud-circle c3"></div>
        <div class="cloud-circle c4"></div>
        <div class="cloud-circle c5"></div>
        <div class="cloud-title">Spend time away from screens</div>
    </section>

    <section class="cloud-box mc-med">
        <div class="cloud-circle c1"></div><div class="cloud-circle c2"></div><div class="cloud-circle c3"></div>
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box mc-extra">
        <div class="cloud-circle c1"></div><div class="cloud-circle c2"></div><div class="cloud-circle c3"></div>
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box mc-img">
        <div class="cloud-circle c1"></div><div class="cloud-circle c2"></div><div class="cloud-circle c3"></div>
        <div class="cloud-text">Text</div>
    </section>

    <section class="cloud-box mc-new">
        <div class="cloud-circle c1"></div><div class="cloud-circle c2"></div><div class="cloud-circle c3"></div>
        <div class="cloud-text">Text</div>
    </section>

    <section class="v-cloud1"></section>
    

    <section class="cloud-wide">
        <img src="images/Test.png" alt="cloud image">
    </section>

</div>

<div class="grass"></div>



</body></html>
