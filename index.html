<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stop Using Social Media</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    position:relative;

    background:
        radial-gradient(
            circle at top,
            rgba(255,255,255,0.18),
            transparent 35%
        ),

        linear-gradient(
            to bottom,
            #ffb15e 0%,
            #ff914d 10%,
            #ff7a59 18%,
            #5ca2ff 38%,
            #2f7fff 72%,
            #1f5fd1 100%
        );
}

body::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
        radial-gradient(
            circle,
            rgba(255,255,255,0.22) 1px,
            transparent 1px
        );

    background-size:40px 40px;

    opacity:.55;

    animation:sparkleMove 25s linear infinite;
}

@keyframes sparkleMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-40px);
    }

}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }

}

.github-btn{
    position:absolute;

    top:16px;
    left:16px;

    padding:10px 20px;

    border-radius:999px;
    border:none;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    text-decoration:none;

    font-size:14px;
    font-weight:700;

    z-index:999;

    transition:.25s;
}

.github-btn:hover{
    background:rgba(255,255,255,0.18);
    transform:translateY(-2px);
}

.sun{
    position:absolute;

    top:70px;
    left:35%;

    transform:translateX(-50%);

    width:120px;
    height:120px;

    border-radius:50%;

    background:
        radial-gradient(
            circle,
            #fff8c7 0%,
            #ffd54f 45%,
            #ffb100 100%
        );

    box-shadow:
        0 0 40px rgba(255,220,120,.7),
        0 0 120px rgba(255,180,0,.5);

    z-index:1;
}

.cloud-container{
    position:relative;
    width:100vw;
    height:100vh;
}

.cloud-box,
.image-cloud,
.cloud-wide{
    background:
        linear-gradient(
            to bottom,
            #ffffff 0%,
            #f1f8ff 100%
        );

    box-shadow:
        0 15px 35px rgba(0,0,0,0.12);

    animation:float 6s ease-in-out infinite;
}

.cloud-box{
    position:absolute;

    border-radius:999px;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    overflow:hidden;
}

.cloud-circle{
    position:absolute;
    border-radius:50%;
    background:inherit;
}

.c1{
    width:60%;
    height:85%;
    left:5%;
    top:10%;
}

.c2{
    width:70%;
    height:100%;
    left:20%;
    top:-25%;
}

.c3{
    width:60%;
    height:85%;
    right:5%;
    top:10%;
}

.c4{
    width:42%;
    height:60%;
    left:50%;
    top:-8%;
}

.c5{
    width:38%;
    height:50%;
    right:18%;
    top:28%;
}

.mc-big{
    width:390px;
    height:230px;

    top:16%;
    left:52%;

    transform:translate(-50%,-50%);
}

.cloud-title{
    position:relative;
    z-index:2;

    width:75%;

    font-size:34px;
    font-weight:800;
    line-height:1.3;

    color:#2456b8;
}

.mc-med{
    width:280px;
    height:170px;

    top:8%;
    left:5%;
}

.mc-extra{
    width:250px;
    height:155px;

    top:8%;
    right:6%;
}

.big-text-content{
    position:relative;
    z-index:2;

    padding:35px;
}

.big-text-content h2{
    font-size:44px;
    font-weight:800;

    margin-bottom:16px;

    color:#2456b8;
}

.big-text-content p{
    font-size:21px;
    line-height:1.8;
    font-weight:600;

    color:#3568cc;
}

.image-row{
    position:absolute;

    top:260px;
    left:120px;

    width:420px;
    height:500px;

    z-index:5;
}

.image-cloud{
    position:absolute;

    width:330px;
    height:190px;

    border-radius:999px;

    overflow:hidden;
}

.image-cloud:first-child{
    top:0;
    left:0;

    transform:rotate(-2deg);
}

.image-cloud:last-child{
    top:220px;
    left:45px;

    transform:rotate(3deg);
}

.image-cloud img{
    position:absolute;

    inset:18px;

    width:calc(100% - 36px);
    height:calc(100% - 36px);

    object-fit:cover;

    border-radius:30px;

    z-index:2;
}

.big-text-cloud{
    width:760px;
    height:250px;

    left:500px;
    bottom:90px;
}

.cloud-wide{
    position:absolute;

    width:260px;
    height:360px;

    top:37%;
    left:82%;

    transform:translate(-50%,-50%);

    border-radius:45px;

    overflow:hidden;
}

.cloud-wide img{
    width:100%;
    height:100%;

    object-fit:cover;
    display:block;
}

.grass{
    position:absolute;

    left:0;
    bottom:0;

    width:100%;
    height:60px;

    background:#39b54a;

    box-shadow:
        inset 0 8px 0 rgba(255,255,255,.12);
}

</style>
</head>

<body>

<a
    class="github-btn"
    href="https://github.com/Carlos733-ai/Project/"
    target="_blank"
>
    Code
</a>

<div class="sun"></div>

<div class="cloud-container">

    <section class="cloud-box mc-big">

        <div class="cloud-circle c1"></div>
        <div class="cloud-circle c2"></div>
        <div class="cloud-circle c3"></div>
        <div class="cloud-circle c4"></div>
        <div class="cloud-circle c5"></div>

        <div class="cloud-title">
            Spend Time Away From Screens
        </div>

    </section>

    <section class="cloud-box mc-med">

        <div class="cloud-circle c1"></div>
        <div class="cloud-circle c2"></div>
        <div class="cloud-circle c3"></div>

        <div class="big-text-content">

            <p>
                Use your phone settings to limit social apps to 30–60 minutes a day.
            </p>

        </div>

    </section>

    <section class="cloud-box mc-extra">

        <div class="cloud-circle c1"></div>
        <div class="cloud-circle c2"></div>
        <div class="cloud-circle c3"></div>

        <div class="big-text-content">

            <p>
                Set specific no-tech zones such as during family meals.
            </p>

        </div>

    </section>

    <div class="image-row">

        <section class="image-cloud">

            <div class="cloud-circle c1"></div>
            <div class="cloud-circle c2"></div>
            <div class="cloud-circle c3"></div>

            <img src="images/image2.png">

        </section>

        <section class="image-cloud">

            <div class="cloud-circle c1"></div>
            <div class="cloud-circle c2"></div>
            <div class="cloud-circle c3"></div>

            <img src="images/image3.png">

        </section>

    </div>

    <section class="cloud-box big-text-cloud">

        <div class="cloud-circle c1"></div>
        <div class="cloud-circle c2"></div>
        <div class="cloud-circle c3"></div>
        <div class="cloud-circle c4"></div>
        <div class="cloud-circle c5"></div>

        <div class="big-text-content">

            <h2>Be Active</h2>

            <p>
                Instead of doomscrolling, send a kind message to a friend or comment something supportive.
            </p>

        </div>

    </section>

    <section class="cloud-wide">

        <img src="images/image.png" alt="Poster Image">

    </section>

</div>

<div class="grass"></div>

</body>
</html>
